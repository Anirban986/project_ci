# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Auto PR + Merge

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr-and-merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "Creating new PR..."
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "Auto PR - ${{ github.ref_name }}" \
              --body "Automated PR from feature branch"
            
            PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number')
            echo "Created PR #$PR_NUMBER"
          else
            echo "PR #$PR_NUMBER already exists"
          fi
          
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Enable Auto Merge
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ env.PR_NUMBER }} --auto --squash